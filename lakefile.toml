name = "FABL"
version = "0.1.0"
description = "Formal Analysis of Boolean Functions in Lean"
keywords = ["mathematics", "boolean-functions", "fourier-analysis", "formalization"]
license = "Apache-2.0"
defaultTargets = ["FABL"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
autoImplicit = false
relaxedAutoImplicit = false
warningAsError = true
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.30.0"

[[lean_lib]]
name = "FABL"
