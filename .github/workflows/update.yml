name: Check Dependency Updates

on:
  # schedule:             # Sets a schedule to trigger the workflow
  #   - cron: "0 8 * * *" # Every day at 08:00 AM UTC (see https://docs.github.com/en/actions/writing-workflows/choosing-when-your-workflow-runs/events-that-trigger-workflows#schedule)
  workflow_dispatch:    # Allows the workflow to be triggered manually via the GitHub interface

jobs:
  check-for-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Run the action
        id: check-for-updates
        uses: leanprover-community/mathlib-update-action@v1
      - name: Summarize available updates
        env:
          IS_UPDATE_AVAILABLE: ${{ steps.check-for-updates.outputs.is-update-available }}
          NEW_TAGS: ${{ steps.check-for-updates.outputs.new-tags }}
        run: |
          if [[ "$IS_UPDATE_AVAILABLE" == "true" ]]; then
            printf 'Mathlib updates are available: %s\n\n' "$NEW_TAGS" >> "$GITHUB_STEP_SUMMARY"
            printf 'Update ProbabilityApproximation to a matching precompiled release before changing FABL.\n' >> "$GITHUB_STEP_SUMMARY"
          else
            printf 'No Mathlib update is available.\n' >> "$GITHUB_STEP_SUMMARY"
          fi
