name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to publish
        required: true
        type: string
      verify_only:
        description: Verify an already-published immutable release without rebuilding or publishing
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Validate release version
        id: version
        env:
          REQUESTED_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          package_version="$(sed -n 's/^version = "\(.*\)"/\1/p' lakefile.toml)"
          test -n "$package_version"
          test "$REQUESTED_TAG" = "v$package_version"
          git rev-parse --verify "refs/tags/$REQUESTED_TAG"
          echo "tag=$REQUESTED_TAG" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    if: github.event_name == 'push' || inputs.verify_only != true
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-latest
          - macos-15
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Set up Lean and restore Mathlib cache
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          use-mathlib-cache: true
          use-github-cache: false

      - name: Build release library as a dependency
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          consumer_dir="$RUNNER_TEMP/fabl-release-builder"
          mkdir -p "$consumer_dir"
          cp lean-toolchain "$consumer_dir/lean-toolchain"
          {
            echo 'name = "FABLReleaseBuilder"'
            echo 'version = "0.0.0"'
            echo
            echo '[[require]]'
            echo 'name = "FABL"'
            printf 'path = "%s"\n' "$GITHUB_WORKSPACE"
          } > "$consumer_dir/lakefile.toml"
          lake -d="$consumer_dir" update
          lake -d="$consumer_dir" exe cache get
          lake -d="$consumer_dir" build @ProbabilityApproximation:release
          ./scripts/verify_probability_approximation_release.sh "$consumer_dir"
          lake --quiet --no-build -d="$consumer_dir" build \
            @ProbabilityApproximation/ProbabilityApproximation
          lake --wfail --no-cache -d="$consumer_dir" build FABL

      - name: Audit release sources
        run: |
          if rg -n --glob '*.lean' \
            '\b(sorry|admit|axiom|unsafe|native_decide)\b' FABL FABL.lean; then
            exit 1
          fi

      - name: Pack Lake release archive
        run: |
          set -euo pipefail
          lake pack
          shopt -s nullglob
          archives=(.lake/FABL-*.tar.gz)
          test "${#archives[@]}" -eq 1
          mkdir -p release-dist
          cp "${archives[0]}" release-dist/

      - name: Preserve the platform archive until publication
        uses: actions/upload-artifact@v7
        with:
          name: fabl-release-${{ matrix.runner }}
          path: release-dist/*.tar.gz
          if-no-files-found: error
          retention-days: 1

  publish:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Collect both platform archives
        uses: actions/download-artifact@v8
        with:
          pattern: fabl-release-*
          path: release-dist
          merge-multiple: true

      - name: Publish one immutable GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(release-dist/FABL-*.tar.gz)
          test "${#assets[@]}" -eq 2
          test "$(printf '%s\n' "${assets[@]}" | grep -Ec '/FABL-x86_64-unknown-linux-gnu\.tar\.gz$')" -eq 1
          test "$(printf '%s\n' "${assets[@]}" | grep -Ec '/FABL-arm64-apple-darwin.*\.tar\.gz$')" -eq 1
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::Release $TAG already exists; published releases and assets are immutable"
            exit 1
          fi
          gh release create "$TAG" "${assets[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "FABL $TAG" \
            --generate-notes \
            --latest

  verify:
    needs:
      - prepare
      - publish
    if: >-
      always() &&
      needs.prepare.result == 'success' &&
      (
        needs.publish.result == 'success' ||
        (github.event_name == 'workflow_dispatch' && inputs.verify_only)
      )
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-latest
          - macos-15
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Set up Lean and restore Mathlib cache
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          use-mathlib-cache: true
          use-github-cache: false

      - name: Consume the published release archive
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          consumer_dir="$RUNNER_TEMP/fabl-release-consumer"
          mkdir -p "$consumer_dir"
          cp lean-toolchain "$consumer_dir/lean-toolchain"
          {
            echo 'name = "FABLReleaseConsumer"'
            echo 'version = "0.0.0"'
            echo
            echo '[[require]]'
            echo 'name = "FABL"'
            echo 'git = "https://github.com/Polarnova/FABL.git"'
            printf 'rev = "%s"\n' "$TAG"
            echo
            echo '[[lean_lib]]'
            echo 'name = "FABLReleaseConsumer"'
          } > "$consumer_dir/lakefile.toml"
          printf '%s\n' \
            'import FABL' \
            '' \
            '#check FABL.card_f₂Cube' \
            '#check FABL.functionAlgebraicDegree' \
            > "$consumer_dir/FABLReleaseConsumer.lean"
          lake -d="$consumer_dir" update
          lake -d="$consumer_dir" exe cache get
          lake -d="$consumer_dir" build @ProbabilityApproximation:release
          "$consumer_dir/.lake/packages/FABL/scripts/verify_probability_approximation_release.sh" \
            "$consumer_dir"
          lake --quiet --no-build -d="$consumer_dir" build \
            @ProbabilityApproximation/ProbabilityApproximation
          lake -d="$consumer_dir" build @FABL:release
          "$consumer_dir/.lake/packages/FABL/scripts/verify_release.sh" "$consumer_dir"
          lake --quiet --no-build -d="$consumer_dir" build @FABL/FABL
          lake -d="$consumer_dir" build FABLReleaseConsumer
