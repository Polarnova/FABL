name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to publish
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Validate release version
        id: version
        env:
          REQUESTED_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          package_version="$(sed -n 's/^version = "\(.*\)"/\1/p' lakefile.toml)"
          test -n "$package_version"
          test "$REQUESTED_TAG" = "v$package_version"
          git rev-parse --verify "refs/tags/$REQUESTED_TAG"
          echo "tag=$REQUESTED_TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --title "FABL $TAG" \
              --generate-notes \
              --latest
          fi

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-latest
          - macos-15
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Set up Lean and restore Mathlib cache
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          use-mathlib-cache: true
          use-github-cache: false

      - name: Build release library as a dependency
        run: |
          set -euo pipefail
          consumer_dir="$RUNNER_TEMP/fabl-release-builder"
          mkdir -p "$consumer_dir"
          cp lean-toolchain "$consumer_dir/lean-toolchain"
          {
            echo 'name = "FABLReleaseBuilder"'
            echo 'version = "0.0.0"'
            echo
            echo '[[require]]'
            echo 'name = "FABL"'
            printf 'path = "%s"\n' "$GITHUB_WORKSPACE"
          } > "$consumer_dir/lakefile.toml"
          lake -d="$consumer_dir" update
          lake -d="$consumer_dir" exe cache get
          lake -d="$consumer_dir" build @ProbabilityApproximation:release
          ./scripts/verify_probability_approximation_release.sh "$consumer_dir"
          lake --quiet --no-build -d="$consumer_dir" build \
            @ProbabilityApproximation/ProbabilityApproximation
          lake --wfail --no-cache -d="$consumer_dir" build FABL

      - name: Audit release sources
        run: |
          if rg -n --glob '*.lean' \
            '\b(sorry|admit|axiom|unsafe|native_decide)\b' FABL FABL.lean; then
            exit 1
          fi

      - name: Upload Lake release archive
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          lake upload "$TAG"

  verify:
    needs:
      - prepare
      - build
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-latest
          - macos-15
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Set up Lean and restore Mathlib cache
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          use-mathlib-cache: true
          use-github-cache: false

      - name: Consume the published release archive
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          consumer_dir="$RUNNER_TEMP/fabl-release-consumer"
          mkdir -p "$consumer_dir"
          cp lean-toolchain "$consumer_dir/lean-toolchain"
          {
            echo 'name = "FABLReleaseConsumer"'
            echo 'version = "0.0.0"'
            echo
            echo '[[require]]'
            echo 'name = "FABL"'
            echo 'git = "https://github.com/Polarnova/FABL.git"'
            printf 'rev = "%s"\n' "$TAG"
            echo
            echo '[[lean_lib]]'
            echo 'name = "FABLReleaseConsumer"'
          } > "$consumer_dir/lakefile.toml"
          printf '%s\n' \
            'import FABL' \
            '' \
            '#check FABL.card_f₂Cube' \
            '#check FABL.functionAlgebraicDegree' \
            > "$consumer_dir/FABLReleaseConsumer.lean"
          lake -d="$consumer_dir" update
          lake -d="$consumer_dir" exe cache get
          lake -d="$consumer_dir" build @FABL:release
          "$consumer_dir/.lake/packages/FABL/scripts/verify_release.sh" "$consumer_dir"
          lake --quiet --no-build -d="$consumer_dir" build @FABL/FABL
          lake -d="$consumer_dir" build FABLReleaseConsumer
