name: Lean Action CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - name: Enforce kernel-checked production sources
        run: |
          if rg -n --glob '*.lean' '\b(sorry|admit|axiom|unsafe|native_decide)\b' FABL FABL.lean; then
            exit 1
          fi
      - uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-github-cache: false
          use-mathlib-cache: true
      - name: Restore FABL build cache
        uses: actions/cache@v4
        with:
          path: .lake/build
          key: fabl-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}-${{ github.sha }}
          restore-keys: |
            fabl-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}-
      - name: Require precompiled ProbabilityApproximation release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          lake build @ProbabilityApproximation:release
          ./scripts/verify_probability_approximation_release.sh
          lake --quiet --no-build build \
            @ProbabilityApproximation/+ProbabilityApproximation.ChenShao.UniformBerryEsseen:olean \
            @ProbabilityApproximation/+ProbabilityApproximation.ChenShao.NonuniformBerryEsseen:olean \
            @ProbabilityApproximation/+ProbabilityApproximation.Bentkus.Induction:olean
      - name: Build FABL
        run: lake build FABL
      - name: Fetch Mathlib cache for Blueprint
        working-directory: blueprint-verso
        run: lake exe cache get
      - name: Restore Blueprint dependency build cache
        uses: actions/cache@v4
        with:
          path: |
            .lake/packages/Cli/.lake/build
            .lake/packages/LeanSearchClient/.lake/build
            .lake/packages/MD4Lean/.lake/build
            .lake/packages/Qq/.lake/build
            .lake/packages/VersoBlueprint/.lake/build
            .lake/packages/aesop/.lake/build
            .lake/packages/batteries/.lake/build
            .lake/packages/illuminate/.lake/build
            .lake/packages/importGraph/.lake/build
            .lake/packages/plausible/.lake/build
            .lake/packages/proofwidgets/.lake/build
            .lake/packages/subverso/.lake/build
            .lake/packages/verso/.lake/build
            .lake/packages/verso-slides/.lake/build
          key: fabl-blueprint-deps-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('blueprint-verso/lean-toolchain', 'blueprint-verso/lake-manifest.json') }}
      - name: Restore Blueprint project build cache
        uses: actions/cache@v4
        with:
          path: blueprint-verso/.lake/build
          key: fabl-blueprint-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('blueprint-verso/lean-toolchain', 'blueprint-verso/lake-manifest.json', 'lake-manifest.json') }}-${{ github.sha }}
          restore-keys: |
            fabl-blueprint-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('blueprint-verso/lean-toolchain', 'blueprint-verso/lake-manifest.json', 'lake-manifest.json') }}-
      - name: Require precompiled ProbabilityApproximation release for Blueprint
        working-directory: blueprint-verso
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          lake build @ProbabilityApproximation:release
          ../scripts/verify_probability_approximation_release.sh
          lake --quiet --no-build build \
            @ProbabilityApproximation/+ProbabilityApproximation.ChenShao.UniformBerryEsseen:olean \
            @ProbabilityApproximation/+ProbabilityApproximation.ChenShao.NonuniformBerryEsseen:olean \
            @ProbabilityApproximation/+ProbabilityApproximation.Bentkus.Induction:olean
      - name: Build and validate Verso Blueprint
        working-directory: blueprint-verso
        run: ./scripts/site.sh build release
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: blueprint-verso/_out/site/html-multi

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
